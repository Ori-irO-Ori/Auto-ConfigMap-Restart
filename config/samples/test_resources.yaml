---
# ConfigMap to watch
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  APP_COLOR: "blue"
  APP_PORT: "8080"
---
# Deployment to restart when the ConfigMap changes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
---
# ConfigWatcher CR: watch app-config and restart demo-app on change
apiVersion: apps.example.com/v1alpha1
kind: ConfigWatcher
metadata:
  name: configwatcher-sample
  namespace: default
spec:
  configMapName: app-config
  deployments:
    - demo-app
